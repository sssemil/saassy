services:
  postgres:
    image: postgres:16-alpine
    container_name: saassy-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-saas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: user_gateway
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saas}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [saassy-net]

  redis:
    image: redis:7-alpine
    container_name: saassy-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [saassy-net]

  user-gateway:
    build: ./services/user-gateway
    image: saassy/user-gateway:latest
    container_name: saassy-user-gateway
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-saas}:${POSTGRES_PASSWORD}@postgres:5432/user_gateway
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      RESEND_API_KEY: ${RESEND_API_KEY:-placeholder}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@localhost}
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost}
      CORS_ORIGIN: ${APP_ORIGIN:-http://localhost}
      BIND_ADDR: 0.0.0.0:3001
      RUST_LOG: ${RUST_LOG:-info}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      IMPERSONATION_TTL_MINUTES: ${IMPERSONATION_TTL_MINUTES:-60}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [saassy-net]

  user-ingress:
    build: ./services/user-ingress
    image: saassy/user-ingress:latest
    container_name: saassy-user-ingress
    environment:
      USER_GATEWAY_URL: http://user-gateway:3001
      NODE_ENV: production
    depends_on: [user-gateway]
    networks: [saassy-net]

  admin-ui:
    build: ./services/admin-ui
    image: saassy/admin-ui:latest
    container_name: saassy-admin-ui
    environment:
      USER_GATEWAY_URL: http://user-gateway:3001
      NODE_ENV: production
    depends_on: [user-gateway]
    networks: [saassy-net]

  project-web:
    build: ./services/project-web
    image: saassy/project-web:latest
    container_name: saassy-project-web
    environment:
      USER_GATEWAY_URL: http://user-gateway:3001
      NODE_ENV: production
    depends_on: [user-gateway]
    networks: [saassy-net]

  caddy:
    image: caddy:2-alpine
    container_name: saassy-caddy
    environment:
      # Dev default serves plain HTTP on :80. Prod sets SITE_ADDRESS to a real
      # domain (e.g. saassy.xyz) and Caddy auto-provisions TLS via Let's Encrypt.
      SITE_ADDRESS: ${SITE_ADDRESS:-http://:80}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - user-gateway
      - user-ingress
      - admin-ui
      - project-web
    networks: [saassy-net]

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  saassy-net:
    driver: bridge
