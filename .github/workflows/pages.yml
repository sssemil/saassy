name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "SKILL.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      # Mirror SKILL.md into the Pages artifact so it's reachable at
      # saassy.xyz/SKILL.md. The canonical copy lives at the repo root;
      # this is a build-time mirror only (docs/SKILL.md is gitignored).
      - name: Stage SKILL.md into docs/
        run: cp SKILL.md docs/SKILL.md

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deploy
        uses: actions/deploy-pages@v4
